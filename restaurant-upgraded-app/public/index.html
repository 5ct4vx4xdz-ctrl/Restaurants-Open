<!DOCTYPE html>
<html>
<head>
  <title>Food and Drink Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #fff7ed;
      --bg2: #eff6ff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand1: #f97316;
      --brand2: #ec4899;
      --brand3: #3b82f6;
      --green: #15803d;
      --red: #b91c1c;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(249,115,22,.15), transparent 26%),
        radial-gradient(circle at top right, rgba(59,130,246,.14), transparent 24%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      min-height: 100vh;
    }

    header {
      padding: 20px 16px 12px;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, var(--brand1) 0%, var(--brand2) 50%, var(--brand3) 100%);
      box-shadow: var(--shadow);
    }

    header h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.1;
    }

    header p {
      margin: 8px 0 0;
      font-size: 15px;
      opacity: 0.95;
    }

    .toolbar-wrap {
      max-width: 1280px;
      margin: 18px auto 0;
      padding: 0 16px;
    }

    .toolbar {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: var(--shadow);
      border-radius: 22px;
      padding: 16px;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr 1.3fr 1fr 1fr 1fr 1fr auto auto;
      gap: 12px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    select, input, button {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font-size: 15px;
      background: white;
    }

    input, select {
      width: 100%;
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    .search-btn {
      color: white;
      background: linear-gradient(135deg, var(--brand1), var(--brand2));
      box-shadow: 0 8px 18px rgba(236,72,153,0.22);
    }

    .reset-btn {
      color: var(--text);
      background: #f3f4f6;
    }

    #statusBar {
      max-width: 1280px;
      margin: 14px auto 0;
      padding: 0 16px;
    }

    .status {
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 16px;
      padding: 12px 14px;
      color: var(--muted);
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .layout {
      max-width: 1280px;
      margin: 16px auto 24px;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 420px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,255,255,0.55));
    }

    .panel-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .count-pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, #fde68a, #fbcfe8);
      font-size: 12px;
      font-weight: 700;
    }

    #results {
      padding: 14px;
      display: grid;
      gap: 14px;
      max-height: calc(100vh - 285px);
      overflow: auto;
    }

    .empty-state {
      text-align: center;
      padding: 28px 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .card {
      background: white;
      border: 1px solid #f1f5f9;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }

    .card:hover, .card.active {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.09);
      border-color: #f9a8d4;
    }

    .card-shell {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      align-items: stretch;
      min-height: 100%;
    }

    .image {
      min-height: 112px;
      background:
        radial-gradient(circle at top left, rgba(249,115,22,.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(59,130,246,.18), transparent 30%),
        #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      overflow: hidden;
      position: relative;
      padding: 10px;
    }

    .image::after {
      content: attr(data-note);
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      padding: 4px 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      color: #475569;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .16s ease, transform .16s ease;
      pointer-events: none;
    }

    .image.low-res::after {
      opacity: 1;
      transform: translateY(0);
    }

    .image img {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      object-fit: cover;
      object-position: center;
      display: block;
      transform: translateZ(0);
      backface-visibility: hidden;
      image-rendering: auto;
      transition: transform .16s ease, filter .16s ease, opacity .16s ease;
    }

    .image.low-res img {
      transform: scale(1.03);
      filter: saturate(0.82) contrast(0.94);
      opacity: 0.86;
    }

    .body {
      padding: 14px;
      min-width: 0;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .title {
      font-size: 19px;
      font-weight: 700;
      line-height: 1.2;
      margin: 0;
    }

    .badge {
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .open {
      background: #dcfce7;
      color: var(--green);
    }

    .closed {
      background: #fee2e2;
      color: var(--red);
    }

    .unknown {
      background: #f3f4f6;
      color: var(--muted);
    }

    .meta {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 7px;
      line-height: 1.45;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .stat {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      color: #334155;
    }

    .link-row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .link-row a {
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      color: #1d4ed8;
      background: #eff6ff;
      padding: 9px 11px;
      border-radius: 10px;
      border: 1px solid #dbeafe;
    }

    #map {
      height: calc(100vh - 285px);
      min-height: 560px;
      width: 100%;
    }

    @media (max-width: 1200px) {
      .controls-grid {
        grid-template-columns: 1fr 1fr 1fr 1fr;
      }
    }
