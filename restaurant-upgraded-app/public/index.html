<!DOCTYPE html>
<html>
<head>
  <title>Find Open Restaurants</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      padding: 16px;
      background: #222;
      color: white;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px;
      justify-content: center;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    select, input, button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #222;
      color: white;
      cursor: pointer;
    }

    #map {
      height: 300px;
    }

    #results {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .image {
      height: 160px;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .body {
      padding: 12px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 14px;
      color: #555;
      margin-bottom: 6px;
    }

    .open { color: green; font-weight: bold; }
    .closed { color: red; font-weight: bold; }

    a {
      color: blue;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>Find Open Restaurants</header>

<div id="controls">
  <select id="mode" onchange="updatePlaceholder()">
    <option value="zip">ZIP Code</option>
    <option value="city">City, State</option>
    <option value="gps">Current Location</option>
  </select>

  <input id="input" placeholder="Enter ZIP code" />

  <button onclick="search()">Search</button>
</div>

<div id="map"></div>
<div id="results"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([37.8, -96], 4);
let markers = [];

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function updatePlaceholder() {
  const mode = document.getElementById('mode').value;
  const input = document.getElementById('input');

  if (mode === 'zip') {
    input.placeholder = "Enter ZIP code";
    input.disabled = false;
  }

  if (mode === 'city') {
    input.placeholder = "City, State (ex: Atlanta, GA)";
    input.disabled = false;
  }

  if (mode === 'gps') {
    input.placeholder = "Using your location...";
    input.disabled = true;
  }
}

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

async function search() {
  const mode = document.getElementById('mode').value;
  const input = document.getElementById('input').value;

  if (mode === 'gps') {
    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      const res = await fetch(`/api/restaurants?lat=${lat}&lng=${lng}`);
      render(await res.json());
    });
    return;
  }

  let url = '';

  if (mode === 'zip') url = `/api/restaurants?zip=${input}`;
  if (mode === 'city') url = `/api/restaurants?location=${input}`;

  const res = await fetch(url);
  render(await res.json());
}

function render(data) {
  const results = document.getElementById('results');
  results.innerHTML = '';
  clearMarkers();

  let bounds = [];

  data.forEach(r => {

    if (r.gps) {
      const marker = L.marker([r.gps.latitude, r.gps.longitude])
        .addTo(map)
        .bindPopup(r.name);
      markers.push(marker);
      bounds.push([r.gps.latitude, r.gps.longitude]);
    }

    const card = document.createElement('div');
    card.className = 'card';

    const imgHTML = (r.thumbnail && r.thumbnail.includes('http'))
      ? `<img src="${r.thumbnail}" onerror="this.parentNode.innerHTML='No Image'"/>`
      : `<div>No Image</div>`;

    card.innerHTML = `
      <div class="image">${imgHTML}</div>
      <div class="body">
        <div class="title">${r.name}</div>
        <div class="meta">${r.type || ''}</div>
        <div class="meta">⭐ ${r.rating || 'N/A'} (${r.reviews || 0})</div>
        <div class="${r.open ? 'open' : 'closed'}">
          ${r.open ? 'Open Now' : 'Closed'}
        </div>
        <div class="meta">${r.address}</div>
        <a href="${r.link}" target="_blank">View Menu / Website</a>
      </div>
    `;

    results.appendChild(card);
  });

  if (bounds.length) {
    map.fitBounds(bounds);
  }
}
</script>

</body>
</html>
