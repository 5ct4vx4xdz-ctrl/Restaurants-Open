
<!DOCTYPE html>
<html>
<head>
  <title>Find Open Restaurants</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { font-family: Arial; margin:0; }
    header { padding:15px; background:#333; color:#fff; text-align:center; font-size:20px;}
    #controls { padding:10px; text-align:center; }
    #map { height:300px; }
    #results { padding:10px; }
    .card { border:1px solid #ddd; margin:10px 0; padding:10px; border-radius:8px; }
    img { width:100%; max-height:150px; object-fit:cover; border-radius:6px; }
  </style>
</head>
<body>

<header>Find Open Restaurants</header>

<div id="controls">
  <input id="zip" placeholder="Enter ZIP code"/>
  <button onclick="search()">Search</button>
</div>

<div id="map"></div>
<div id="results"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([37.8, -96], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

async function search() {
  const zip = document.getElementById('zip').value;
  const res = await fetch(`/api/restaurants?zip=${zip}`);
  const data = await res.json();

  document.getElementById('results').innerHTML = '';

  data.forEach(r => {
    if(r.gps){
      L.marker([r.gps.latitude, r.gps.longitude])
        .addTo(map)
        .bindPopup(r.name);
    }

    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      ${r.thumbnail ? `<img src="${r.thumbnail}"/>` : ''}
      <h3>${r.name}</h3>
      <p>${r.type || ''}</p>
      <p>⭐ ${r.rating || 'N/A'} (${r.reviews || 0})</p>
      <p>${r.open ? 'Open Now' : 'Closed'}</p>
      <p>${r.address}</p>
      <a href="${r.link}" target="_blank">View Menu / Website</a>
    `;

    document.getElementById('results').appendChild(div);
  });
}
</script>

</body>
</html>
